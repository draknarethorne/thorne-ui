name: Issue Triage Commenter

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: read

jobs:
  triage-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post triage guidance comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            // Avoid bot loops and noise.
            if (issue.user?.type === 'Bot') {
              core.info('Issue opened by bot; skipping triage comment.');
              return;
            }

            const marker = '<!-- thorne-triage-comment:v1 -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const alreadyCommented = comments.some(c => (c.body || '').includes(marker));
            if (alreadyCommented) {
              core.info('Triage comment already exists; skipping.');
              return;
            }

            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const text = `${title}\n${body}`;

            const suggestions = [];

            // Priority hints
            if (/(crash|freeze|blocked|data loss|cannot|can't)/i.test(text)) suggestions.push('priority:critical');
            else if (/(major|severe|broken|fails|unusable)/i.test(text)) suggestions.push('priority:high');
            else if (/(cosmetic|minor|typo|alignment|spacing)/i.test(text)) suggestions.push('priority:low');
            else suggestions.push('priority:medium');

            // UI scope hints
            const uiMap = [
              ['actions', 'ui:actions'],
              ['inventory', 'ui:inventory'],
              ['merchant', 'ui:merchant'],
              ['bazaar', 'ui:bazaar'],
              ['player', 'ui:player'],
              ['group', 'ui:group'],
              ['target', 'ui:target'],
              ['spellbook', 'ui:spellbook'],
              ['loot', 'ui:loot']
            ];

            for (const [needle, label] of uiMap) {
              if (text.includes(needle)) {
                suggestions.push(label);
                break;
              }
            }

            // Type hints
            if (title.startsWith('bug:') || text.includes('actual behavior')) suggestions.push('bug');
            if (title.startsWith('feat:') || title.startsWith('feature:')) suggestions.push('enhancement');
            if (title.startsWith('testing:') || text.includes('testing session context')) suggestions.push('testing');

            const uniq = [...new Set(suggestions)];
            const suggestionLine = uniq.length ? uniq.map(s => `\`${s}\``).join(', ') : '_No suggestions_';

            const comment = [
              marker,
              '🧭 **Triage helper**',
              '',
              'Thanks for filing this. Suggested labels based on content:',
              '',
              `- ${suggestionLine}`,
              '',
              'Quick actions:',
              '- Confirm / adjust labels',
              '- Add reproduction details if missing',
              '- Link a follow-up PR with `Closes #<issue>` when fixed',
              '',
              'Legendary tracking keeps legendary progress. ⚔️'
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: comment
            });
