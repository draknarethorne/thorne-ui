name: Issue Governance

on:
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  pr-linked-issue-check:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Require linked issue reference in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || "").trim();
            const hasReference = /(close[sd]?|fix(e[sd])?|resolve[sd]?|ref(?:s|erences)?|related to)\s*#\d+/i.test(body);
            if (!hasReference) {
              core.setFailed(
                "PR must reference at least one issue (e.g., 'Closes #123' or 'Related to #123')."
              );
            }

  issue-auto-label:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on issue content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || "").toLowerCase();
            const title = (issue.title || "").toLowerCase();

            const current = issue.labels.map(l => l.name);
            const add = new Set();

            if (title.startsWith("bug:") || body.includes("actual behavior")) add.add("bug");
            if (title.startsWith("feat:") || title.startsWith("feature:")) add.add("enhancement");
            if (title.startsWith("testing:") || body.includes("testing session context")) add.add("testing");

            if (body.includes("critical")) add.add("priority:critical");
            else if (body.includes("high")) add.add("priority:high");
            else if (body.includes("medium")) add.add("priority:medium");
            else if (body.includes("low")) add.add("priority:low");

            const labelsToAdd = [...add].filter(l => !current.includes(l));
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
            }
